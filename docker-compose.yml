version: '3.8'

services:
  gvitor-system:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    image: gvitor-system:latest
    container_name: gvitor-system-container
    ports:
      - "8080:80"
    restart: always
    environment:
      - NODE_ENV=production
